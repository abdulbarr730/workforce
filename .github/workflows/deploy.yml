name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /var/www/workforce
            git pull origin main
            npm install
            npm run build
            cd apps/backend
            pm2 restart workforce-api || pm2 start dist/index.js --name "workforce-api"
            pm2 save
