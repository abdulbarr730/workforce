services:

  mongo:
    image: mongo:7

    container_name: workforce-mongo

    restart: always

    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password

    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7

    container_name: workforce-redis

    restart: always

    ports:
      - "6379:6379"

volumes:
  mongo-data: